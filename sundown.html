<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sundown</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e8e4dc;--muted:#666560;--accent:#e8673a;--accent2:#c44f26;
  --green:#4a9e6b;--red:#b84040;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.12em;color:var(--accent);text-transform:uppercase}
.logo span{color:var(--muted);font-weight:300}
.node-pill{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--muted)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s}
.status-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.main{flex:1;display:grid;grid-template-columns:220px 1fr;max-width:1100px;margin:0 auto;width:100%}
.sidebar{border-right:1px solid var(--border);padding:24px 0;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto;display:flex;flex-direction:column}
.nav-section{margin-bottom:24px}
.nav-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;padding:0 20px;margin-bottom:6px;display:block}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-size:13px;color:var(--muted);border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text);background:var(--surface)}
.nav-item.active{color:var(--text);border-left-color:var(--accent);background:var(--surface)}
.badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-family:var(--mono);padding:1px 5px;border-radius:3px;min-width:18px;text-align:center}
.content{padding:32px;overflow-y:auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px 24px;margin-bottom:12px}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;background:var(--surface2)}
.post-name{font-size:13px;font-weight:500}
.post-handle{font-family:var(--mono);font-size:11px;color:var(--muted)}
.post-time{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)}
.post-body{font-size:13px;line-height:1.7;color:var(--text)}
.post-footer{display:flex;align-items:center;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.enc-tag{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
.section-title{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.composer{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:20px}
.composer textarea{width:100%;background:transparent;border:none;outline:none;font-family:var(--sans);font-size:13px;color:var(--text);resize:none;min-height:64px;line-height:1.6}
.composer textarea::placeholder{color:var(--muted)}
.composer-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.composer-hint{font-family:var(--mono);font-size:10px;color:var(--muted)}
.btn{padding:8px 16px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);background:var(--surface2)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{filter:brightness(.9)}
.btn-red{background:var(--red);color:#fff}
.req-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:10px}
.req-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.req-intro{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:10px}
.req-actions{display:flex;gap:8px}
.auth-screen{max-width:400px;margin:80px auto;text-align:center}
.auth-logo{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--accent);letter-spacing:.12em;margin-bottom:8px}
.auth-sub{color:var(--muted);font-size:13px;margin-bottom:36px}
.auth-form{text-align:left}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.field input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:5px;padding:10px 14px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--muted)}
.auth-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:5px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);margin-top:6px;transition:background .15s}
.auth-btn:hover{background:var(--accent2)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-note{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;margin-top:14px}
.auth-err{color:#b84040;font-size:12px;margin-top:10px;text-align:center;font-family:var(--mono)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.info-cell{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px}
.info-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.info-value{font-family:var(--mono);font-size:11px;color:var(--text);word-break:break-all}
.info-value.accent{color:var(--accent)}
.conn-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.conn-card:hover{border-color:var(--border2)}
.conn-info{flex:1}
.conn-name{font-size:13px;font-weight:500}
.conn-handle{font-family:var(--mono);font-size:11px;color:var(--muted)}
.conn-url{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.conn-actions{display:flex;gap:6px}
.empty{text-align:center;padding:48px 24px;color:var(--muted);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:12px;opacity:.4}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:12px 18px;font-family:var(--mono);font-size:12px;color:var(--text);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.mono{font-family:var(--mono)}
.mt8{margin-top:8px}
.mt16{margin-top:16px}
.tag{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;margin-left:6px}
.tag-green{background:rgba(74,158,107,.2);color:var(--green)}
.tag-amber{background:rgba(200,150,50,.2);color:#c89632}
</style>
</head>
<body>

<div id="auth-screen" class="auth-screen">
  <div class="auth-logo">SUNDOWN</div>
  <div class="auth-sub">Ontario · v1.0</div>
  <div class="auth-form">
    <div class="field">
      <label>Node URL</label>
      <input type="text" id="node-url" value="http://localhost:8080" placeholder="http://localhost:8080">
    </div>
    <div class="field">
      <label>Passphrase</label>
      <input type="password" id="passphrase" placeholder="Your node passphrase">
    </div>
    <button class="auth-btn" id="auth-btn" onclick="doLogin()">Connect to node</button>
    <div class="auth-err hidden" id="auth-err"></div>
    <div class="auth-note">Keys are decrypted locally. Your passphrase is never stored.</div>
  </div>
</div>

<div id="app" class="app hidden">
  <div class="topbar">
    <div class="logo">SUNDOWN <span>/ Ontario</span></div>
    <div class="node-pill">
      <div class="status-dot online"></div>
      <span id="topbar-handle">@—</span>
      <span style="color:var(--border2)">·</span>
      <span id="topbar-nodeid" style="font-size:10px"></span>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="nav-section">
        <span class="nav-label">Node</span>
        <div class="nav-item active" id="nav-feed" onclick="showTab('feed')"><span>◈</span> Feed</div>
        <div class="nav-item" id="nav-compose" onclick="showTab('compose')"><span>✦</span> New post</div>
        <div class="nav-item" id="nav-requests" onclick="showTab('requests')">
          <span>◎</span> Requests
          <span class="badge hidden" id="req-badge">0</span>
        </div>
      </div>
      <div class="nav-section">
        <span class="nav-label">Network</span>
        <div class="nav-item" id="nav-connections" onclick="showTab('connections')">
          <span>⇆</span> Connections
          <span class="badge hidden" id="conn-badge">0</span>
        </div>
        <div class="nav-item" id="nav-connect" onclick="showTab('connect')"><span>⊕</span> Connect</div>
        <div class="nav-item" id="nav-info" onclick="showTab('info')"><span>◇</span> Node info</div>
      </div>
      <div style="margin-top:auto">
        <div class="nav-item" onclick="doLogout()" style="color:var(--muted)"><span>↩</span> Disconnect</div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
const S = {
  nodeURL: '', token: '', node: null,
  myPrivateKey: null,   // CryptoKey (X25519, non-extractable for ECDH)
  myPrivKeyRaw: null,   // Uint8Array (raw bytes, for re-import per operation)
  myContentKey: null,   // Uint8Array (AES-256 key bytes)
  myPublicKey: null,    // Uint8Array
  posts: [],
  pending: [],
  connections: [],      // {id, remote_node_id, remote_handle, remote_node_url, remote_public_key, encrypted_their_key, encrypted_their_iv}
  connFeeds: {},        // remote_node_id → decrypted posts
  pollTimer: null,
};

// ── Crypto ────────────────────────────────────────────────────────────────

function b64ToBytes(b64) {
  const s = b64.replace(/-/g,'+').replace(/_/g,'/');
  const pad = s.length % 4 ? '='.repeat(4 - s.length % 4) : '';
  const raw = atob(s + pad);
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}

function bytesToB64(bytes) {
  let s = '';
  bytes.forEach(b => s += String.fromCharCode(b));
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

// X25519 raw key import is not supported in Chrome (security policy).
// We always use server-side ECDH. This flag stays false intentionally.
let x25519Supported = false;
async function checkX25519() { return false; }

// Import X25519 private key from raw bytes
async function importPrivKey(rawBytes) {
  return crypto.subtle.importKey('raw', rawBytes, {name:'X25519'}, true, ['deriveBits']);
}

// Import X25519 public key from raw bytes
async function importPubKey(rawBytes) {
  return crypto.subtle.importKey('raw', rawBytes, {name:'X25519'}, true, []);
}

// ECDH + HKDF — derives the shared content key (spec Section 4.1 + 4.2)
// Falls back to a server-side derivation if X25519 is not supported
async function deriveContentKey(myPrivKey, theirPubKeyBytes) {
  const theirPubKey = await importPubKey(theirPubKeyBytes);
  const sharedBits = await crypto.subtle.deriveBits(
    {name:'X25519', public:theirPubKey}, myPrivKey, 256
  );
  const shared = new Uint8Array(sharedBits);
  const salt = new Uint8Array(32);
  const info = new TextEncoder().encode('sundown-content-v1');
  const hkdfKey = await crypto.subtle.importKey('raw', shared, 'HKDF', false, ['deriveBits']);
  const keyBits = await crypto.subtle.deriveBits(
    {name:'HKDF', hash:'SHA-256', salt, info}, hkdfKey, 256
  );
  return new Uint8Array(keyBits);
}

// AES-256-GCM encrypt
async function aesEncrypt(keyBytes, plaintext) {
  const key = await crypto.subtle.importKey('raw', keyBytes, {name:'AES-GCM'}, false, ['encrypt']);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, plaintext);
  return {iv, ciphertext: new Uint8Array(ct)};
}

// AES-256-GCM decrypt
async function aesDecrypt(keyBytes, iv, ciphertext) {
  const key = await crypto.subtle.importKey('raw', keyBytes, {name:'AES-GCM'}, false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ciphertext);
  return new Uint8Array(plain);
}

// ── API ───────────────────────────────────────────────────────────────────
async function api(method, path, body, baseURL) {
  const url = (baseURL || S.nodeURL) + path;
  const opts = {method, headers:{'Content-Type':'application/json','SD-Client':'sundown-browser/1.0'}};
  if (S.token) opts.headers['Authorization'] = 'Bearer ' + S.token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || 'HTTP ' + r.status);
  return j;
}

// ── Login ─────────────────────────────────────────────────────────────────
async function doLogin() {
  const btn = document.getElementById('auth-btn');
  const errEl = document.getElementById('auth-err');
  const url = document.getElementById('node-url').value.trim().replace(/\/$/,'');
  const pp = document.getElementById('passphrase').value;
  if (!url || !pp) { showAuthErr('Node URL and passphrase are required'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Connecting...';
  errEl.classList.add('hidden');

  try {
    // 1. Fetch node descriptor
    const wk = await fetch(`${url}/.well-known/sundown.json`).then(r=>r.json());
    S.nodeURL = url;
    S.node = wk;

    // 2. Unlock — get server token
    const unlock = await fetch(`${url}/auth/unlock`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({passphrase: pp})
    });
    if (!unlock.ok) { const e = await unlock.json(); throw new Error(e.error || 'Unlock failed'); }
    const ud = await unlock.json();
    S.token = ud.token;

    // 3. Fetch decrypted key material
    const keys = await api('GET', '/auth/keys');
    S.myPrivKeyRaw = b64ToBytes(keys.private_key);
    S.myContentKey = b64ToBytes(keys.content_key);
    S.myPublicKey  = b64ToBytes(keys.public_key);
    // Check X25519 support
    const hasX25519 = await checkX25519();
    if (hasX25519) {
      S.myPrivateKey = await importPrivKey(S.myPrivKeyRaw);
    } else {
      S.myPrivateKey = null;
      console.log('Using server-side ECDH (Chrome raw key import not supported).');
    }

    // Verify the content key works by decrypting the server-provided test value
    if (keys.verify_iv && keys.verify_ct) {
      try {
        const testPlain = await aesDecrypt(
          S.myContentKey,
          b64ToBytes(keys.verify_iv),
          b64ToBytes(keys.verify_ct)
        );
        const testText = new TextDecoder().decode(testPlain);
        if (testText !== 'sundown-key-verify-v1') {
          throw new Error('Key verification mismatch');
        }
        console.log('Content key verified successfully');
      } catch(e) {
        throw new Error('Content key verification failed — key may be corrupted: ' + e.message);
      }
    }

    // 4. Show app
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('topbar-handle').textContent = '@' + wk.display_name.toLowerCase();
    document.getElementById('topbar-nodeid').textContent = wk.node_id.slice(0,20) + '…';

    await refreshConnections();
    await refreshPending();
    showTab('feed');
    startPolling();

  } catch(e) {
    showAuthErr(e.message);
    btn.disabled = false;
    btn.textContent = 'Connect to node';
  }
}

function showAuthErr(msg) {
  const e = document.getElementById('auth-err');
  e.textContent = msg;
  e.classList.remove('hidden');
}

function doLogout() {
  stopPolling();
  Object.assign(S, {token:'',node:null,myPrivateKey:null,myPrivKeyRaw:null,myContentKey:null,posts:[],pending:[],connections:[],connFeeds:{}});
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('passphrase').value = '';
}

// ── Polling ───────────────────────────────────────────────────────────────
let pollInterval = 30000, pollMisses = 0;
function startPolling() { schedulePoll(); }
function stopPolling() { if (S.pollTimer) clearTimeout(S.pollTimer); }
function schedulePoll() {
  const j = pollInterval * 0.1 * (Math.random()*2-1);
  S.pollTimer = setTimeout(runPoll, pollInterval + j);
}
async function runPoll() {
  try {
    await refreshFeed();
    await refreshPending();
    await refreshConnections();
    await fetchConnectionFeeds();
    pollMisses = 0;
    pollInterval = Math.max(30000, pollInterval * 0.7);
  } catch(e) {
    pollMisses++;
    if (pollMisses > 3) pollInterval = Math.min(pollInterval * 1.5, 600000);
  }
  schedulePoll();
}

// ── My feed ───────────────────────────────────────────────────────────────
async function refreshFeed() {
  const data = await api('GET', '/feed');
  S.posts = data.posts || [];
  if (activeTab === 'feed') renderFeed();
}

function renderFeed() {
  const c = document.getElementById('content');

  // Build connection feeds section
  let connPosts = [];
  for (const conn of S.connections) {
    const posts = S.connFeeds[conn.remote_node_id] || [];
    posts.forEach(p => connPosts.push({...p, _conn: conn}));
  }
  connPosts.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

  const allEmpty = S.posts.length === 0 && connPosts.length === 0;

  let html = '<div class="section-title">Feed</div>' + composerHTML();

  if (allEmpty) {
    html += `<div class="empty"><div class="empty-icon">◈</div>Your feed is empty. Posts you publish appear here.</div>`;
    c.innerHTML = html;
    wireComposer();
    return;
  }

  // My posts
  if (S.posts.length > 0) {
    html += '<div class="section-title" style="margin-top:20px">Your posts</div>';
    S.posts.forEach(p => { html += postCardHTML(p, S.node.display_name, S.node.node_id, true); });
  }

  // Connection posts
  if (connPosts.length > 0) {
    html += '<div class="section-title" style="margin-top:20px">From connections</div>';
    connPosts.forEach(p => { html += postCardHTML(p, p._conn.remote_handle, p._conn.remote_node_id, false, p._conn); });
  }

  c.innerHTML = html;
  wireComposer();
}

function postCardHTML(p, name, nodeId, isMine, conn) {
  const time = new Date(p.created_at).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const bodyId = 'post-' + p.post_id;
  const decrypted = p._decrypted;
  const body = decrypted ? escHtml(decrypted) : '<span style="color:var(--muted);font-size:12px;font-style:italic">encrypted</span>';
  const decBtn = !decrypted ? `<button class="btn btn-ghost btn-sm" onclick="decryptPost('${p.post_id}','${p.iv}','${p.ciphertext}',${isMine ? 'null' : `'${conn.remote_node_id}'`})">Decrypt</button>` : '';
  return `
    <div class="card">
      <div class="card-header">
        <div class="avatar" style="background:${hashColor(nodeId)}">${(name||'?')[0].toUpperCase()}</div>
        <div>
          <div class="post-name">${escHtml(name)}</div>
          <div class="post-handle mono">${nodeId.slice(0,24)}…</div>
        </div>
        <div class="post-time">${time}</div>
      </div>
      <div class="post-body" id="${bodyId}">${body}</div>
      <div class="post-footer">
        ${decBtn}
        <div class="enc-tag">🔒 e2e encrypted</div>
      </div>
    </div>`;
}

async function decryptPost(postId, ivB64, ctB64, remoteNodeId) {
  try {
    let key;
    if (remoteNodeId) {
      key = await getConnectionKey(remoteNodeId);
      if (!key) { toast('Could not derive key for this connection'); return; }
    } else {
      key = S.myContentKey;
      if (!key) { toast('Content key not loaded — please reconnect'); return; }
    }
    const iv = b64ToBytes(ivB64);
    const ct = b64ToBytes(ctB64);
    const plain = await aesDecrypt(key, iv, ct);
    const text = new TextDecoder().decode(plain);
    // Cache decrypted result
    if (remoteNodeId) {
      const feed = S.connFeeds[remoteNodeId] || [];
      const post = feed.find(p => p.post_id === postId);
      if (post) post._decrypted = text;
    } else {
      const post = S.posts.find(p => p.post_id === postId);
      if (post) post._decrypted = text;
    }
    document.getElementById('post-' + postId).textContent = text;
  } catch(e) {
    toast('Decryption failed: ' + e.message);
  }
}

// Get the content key for a connection.
// Fetches their content key wrapped for us from their node,
// then asks our server to unwrap it using ECDH.
async function getConnectionKey(remoteNodeId) {
  const conn = S.connections.find(c => c.remote_node_id === remoteNodeId);
  if (!conn) return null;
  if (conn._contentKey) return conn._contentKey;

  try {
    // Step 1: fetch their content key wrapped for us from their node
    const theirNodeURL = conn.remote_node_url.replace(/\/$/,'');
    const wkResp = await fetch(
      `${theirNodeURL}/content-key?for_node_id=${encodeURIComponent(S.node.node_id)}&public_key=${encodeURIComponent(S.node.public_key)}`
    ).then(r => r.json());

    if (wkResp.error) throw new Error(wkResp.error);

    // Step 2: ask our server to unwrap it using our private key
    const unwrapResp = await api('POST', '/auth/unwrap-key', {
      encrypted_key:    wkResp.encrypted_key,
      iv:               wkResp.iv,
      their_public_key: conn.remote_public_key,
    });

    const key = b64ToBytes(unwrapResp.content_key);
    conn._contentKey = key;
    return key;
  } catch(e) {
    console.error('getConnectionKey failed:', e);
    return null;
  }
}

// ── Composer ──────────────────────────────────────────────────────────────
function composerHTML() {
  return `<div class="composer">
    <textarea id="compose-text" placeholder="What's on your mind? (encrypted before sending)"></textarea>
    <div class="composer-footer">
      <span class="composer-hint">🔒 AES-256-GCM encrypted in browser</span>
      <button class="btn btn-primary btn-sm" id="post-btn" onclick="doPublish()" disabled>Publish</button>
    </div>
  </div>`;
}
function wireComposer() {
  const ta = document.getElementById('compose-text');
  const btn = document.getElementById('post-btn');
  if (!ta||!btn) return;
  ta.addEventListener('input', ()=>btn.disabled = ta.value.trim().length===0);
}

async function doPublish() {
  const ta = document.getElementById('compose-text');
  const text = ta.value.trim();
  if (!text) return;
  if (!S.myContentKey) { toast('Content key not loaded — please reconnect'); return; }
  const {iv, ciphertext} = await aesEncrypt(S.myContentKey, new TextEncoder().encode(text));
  try {
    await api('POST', '/feed', {iv: bytesToB64(iv), ciphertext: bytesToB64(ciphertext)});
    ta.value = '';
    document.getElementById('post-btn').disabled = true;
    toast('Post published');
    await refreshFeed();
  } catch(e) { toast('Publish failed: ' + e.message); }
}

// ── Fetch connection feeds ────────────────────────────────────────────────
async function fetchConnectionFeeds() {
  for (const conn of S.connections) {
    try {
      const since = getLastSeen(conn.remote_node_id);
      const url = conn.remote_node_url.replace(/\/$/,'');
      const data = await fetch(`${url}/feed?since=${since}`).then(r=>r.json());
      const posts = data.posts || [];
      if (!S.connFeeds[conn.remote_node_id]) S.connFeeds[conn.remote_node_id] = [];
      // Merge new posts (avoid duplicates)
      const existing = new Set(S.connFeeds[conn.remote_node_id].map(p=>p.post_id));
      posts.forEach(p => { if (!existing.has(p.post_id)) S.connFeeds[conn.remote_node_id].push(p); });
      S.connFeeds[conn.remote_node_id].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
      if (posts.length > 0) setLastSeen(conn.remote_node_id, posts[0].created_at);
    } catch(e) { /* node offline — skip */ }
  }
  if (activeTab === 'feed') renderFeed();
}

function getLastSeen(nodeId) {
  return localStorage.getItem('lastseen_' + nodeId) || '2020-01-01T00:00:00Z';
}
function setLastSeen(nodeId, ts) {
  localStorage.setItem('lastseen_' + nodeId, ts);
}

// ── Connections ───────────────────────────────────────────────────────────
async function refreshConnections() {
  try {
    const data = await api('GET', '/connections');
    S.connections = data.connections || [];
    const badge = document.getElementById('conn-badge');
    if (S.connections.length > 0) {
      badge.textContent = S.connections.length;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
    if (activeTab === 'connections') renderConnections();
  } catch(e) { /* endpoint may not exist yet */ }
}

function renderConnections() {
  const c = document.getElementById('content');
  if (S.connections.length === 0) {
    c.innerHTML = `<div class="section-title">Connections</div>
      <div class="empty"><div class="empty-icon">⇆</div>No confirmed connections yet.<br>Use Connect to find people.</div>`;
    return;
  }

  // Deduplicate by remote_node_id (keep most recent)
  const seen = new Map();
  S.connections.forEach(conn => {
    if (!seen.has(conn.remote_node_id) ||
        new Date(conn.confirmed_at) > new Date(seen.get(conn.remote_node_id).confirmed_at)) {
      seen.set(conn.remote_node_id, conn);
    }
  });

  const cards = Array.from(seen.values()).map(conn => {
    const postCount = (S.connFeeds[conn.remote_node_id]||[]).length;
    return `<div class="conn-card" onclick="viewConnFeed('${conn.remote_node_id}')">
      <div class="avatar" style="background:${hashColor(conn.remote_node_id)};width:40px;height:40px;font-size:14px">
        ${(conn.remote_handle||'?')[0].toUpperCase()}
      </div>
      <div class="conn-info">
        <div class="conn-name">${escHtml(conn.remote_handle||'Unknown')}</div>
        <div class="conn-url">${conn.remote_node_url}</div>
      </div>
      ${postCount > 0 ? `<span class="tag tag-green">${postCount} posts</span>` : ''}
      <div class="conn-actions">
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();fetchConnFeed('${conn.remote_node_id}')">Refresh</button>
      </div>
    </div>`;
  }).join('');

  c.innerHTML = `<div class="section-title">Connections (${seen.size})</div>${cards}`;
}

async function fetchConnFeed(remoteNodeId) {
  const conn = S.connections.find(c => c.remote_node_id === remoteNodeId);
  if (!conn) return;
  toast('Fetching posts…');
  try {
    const url = conn.remote_node_url.replace(/\/$/,'');
    const data = await fetch(`${url}/feed`).then(r=>r.json());
    S.connFeeds[remoteNodeId] = data.posts || [];
    toast(`Fetched ${S.connFeeds[remoteNodeId].length} posts`);
    if (activeTab === 'connections') renderConnections();
  } catch(e) { toast('Could not reach node: ' + e.message); }
}

function viewConnFeed(remoteNodeId) {
  const conn = S.connections.find(c => c.remote_node_id === remoteNodeId);
  if (!conn) return;
  const posts = S.connFeeds[remoteNodeId] || [];
  const c = document.getElementById('content');

  let html = `<div class="section-title">
    <button class="btn btn-ghost btn-sm" onclick="showTab('connections')" style="margin-right:8px">← Back</button>
    ${escHtml(conn.remote_handle||'Unknown')}'s feed
  </div>`;

  if (posts.length === 0) {
    html += `<div class="empty"><div class="empty-icon">◈</div>No posts fetched yet.
      <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="fetchConnFeed('${remoteNodeId}')">Fetch posts</button>
    </div>`;
  } else {
    posts.forEach(p => { html += postCardHTML(p, conn.remote_handle, remoteNodeId, false, conn); });
  }

  c.innerHTML = html;
}

// ── Pending requests ──────────────────────────────────────────────────────
async function refreshPending() {
  try {
    const data = await api('GET', '/connect/pending');
    S.pending = data.pending || [];
    const badge = document.getElementById('req-badge');
    if (S.pending.length > 0) { badge.textContent = S.pending.length; badge.classList.remove('hidden'); }
    else badge.classList.add('hidden');
    if (activeTab === 'requests') renderRequests();
  } catch(e) {}
}

function renderRequests() {
  const c = document.getElementById('content');
  if (S.pending.length === 0) {
    c.innerHTML = `<div class="section-title">Connection requests</div>
      <div class="empty"><div class="empty-icon">◎</div>No pending requests.</div>`;
    return;
  }
  const cards = S.pending.map(r => `
    <div class="req-card" id="req-${r.request_id}">
      <div class="req-header">
        <div class="avatar" style="background:${hashColor(r.from_node_id)}">${(r.from_display_name||'?')[0].toUpperCase()}</div>
        <div>
          <div class="post-name">${escHtml(r.from_display_name||'Unknown')}</div>
          <div class="post-handle mono">${r.from_node_id.slice(0,28)}…</div>
        </div>
        <div class="post-time">${new Date(r.received_at).toLocaleDateString()}</div>
      </div>
      ${r.intro ? `<div class="req-intro">"${escHtml(r.intro)}"</div>` : ''}
      <div class="req-actions mt8">
        <button class="btn btn-green btn-sm" onclick="doConfirm('${r.request_id}','${r.from_public_key}','${r.from_node_id}','${r.from_display_name}','${r.from_node_url||''}')">Confirm</button>
        <button class="btn btn-ghost btn-sm" onclick="doReject('${r.request_id}')">Reject</button>
      </div>
    </div>`).join('');
  c.innerHTML = `<div class="section-title">Connection requests (${S.pending.length})</div>${cards}`;
}

// Confirm a connection request — server performs ECDH key exchange.
// The server uses its in-memory private key to wrap our content key for them.
// This works regardless of browser X25519 support.
async function doConfirm(requestId, theirPubKeyB64, theirNodeId, theirHandle, theirNodeURL) {
  try {
    toast('Confirming connection…');

    // Server performs ECDH and stores the connection in one step
    await api('POST', `/confirm-server/${requestId}`, {});

    document.getElementById(`req-${requestId}`)?.remove();
    S.pending = S.pending.filter(r => r.request_id !== requestId);
    await refreshPending();
    await refreshConnections();
    toast('Connected!');
  } catch(e) {
    toast('Confirm failed: ' + e.message);
  }
}

async function doReject(requestId) {
  try {
    await api('POST', `/connect/${requestId}/reject`, {});
    toast('Request rejected');
    document.getElementById(`req-${requestId}`)?.remove();
    S.pending = S.pending.filter(r => r.request_id !== requestId);
    await refreshPending();
  } catch(e) { toast('Reject failed: ' + e.message); }
}

// ── Connect (send request) ────────────────────────────────────────────────
function renderConnect() {
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="section-title">Send connection request</div>
    <div class="card">
      <div class="field">
        <label>Their node URL</label>
        <input type="text" id="target-url" placeholder="http://localhost:8082" style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:5px;padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none">
      </div>
      <div class="field mt8">
        <label>Intro message (optional)</label>
        <input type="text" id="intro-msg" placeholder="Hey, it's me from the conference" style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:5px;padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none">
      </div>
      <button class="btn btn-primary mt16" onclick="doSendRequest()">Send request</button>
    </div>
    <div class="section-title mt16">Search yellow pages</div>
    <div class="card">
      <div style="display:flex;gap:8px">
        <input type="text" id="yp-url" value="http://localhost:8081" style="flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:5px;padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none">
        <input type="text" id="yp-query" placeholder="Search handle…" style="flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:5px;padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none">
        <button class="btn btn-ghost" onclick="doSearch()">Search</button>
      </div>
      <div id="yp-results" style="margin-top:12px"></div>
    </div>`;
}

async function doSearch() {
  const ypURL = document.getElementById('yp-url').value.trim().replace(/\/$/,'');
  const q = document.getElementById('yp-query').value.trim();
  if (!ypURL || !q) return;
  const container = document.getElementById('yp-results');
  container.innerHTML = '<span style="color:var(--muted);font-family:var(--mono);font-size:11px">Searching…</span>';
  try {
    const data = await fetch(`${ypURL}/directory?q=${encodeURIComponent(q)}`).then(r=>r.json());
    const results = data.results || [];
    if (results.length === 0) { container.innerHTML = '<span style="color:var(--muted);font-family:var(--mono);font-size:11px">No results.</span>'; return; }
    container.innerHTML = results.map(r => `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div class="avatar" style="background:${hashColor(r.node_id)};width:28px;height:28px;font-size:11px">${(r.display_name||'?')[0].toUpperCase()}</div>
        <div>
          <div style="font-size:12px;font-weight:500">${escHtml(r.display_name)}</div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">@${r.handle} · ${r.node_url}</div>
        </div>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="document.getElementById('target-url').value='${r.node_url}'">Use</button>
      </div>`).join('');
  } catch(e) { container.innerHTML = `<span style="color:var(--muted);font-family:var(--mono);font-size:11px">Error: ${e.message}</span>`; }
}

async function doSendRequest() {
  const targetURL = document.getElementById('target-url').value.trim().replace(/\/$/,'');
  const intro = document.getElementById('intro-msg').value.trim();
  if (!targetURL) { toast('Enter the target node URL'); return; }
  try {
    await fetch(`${targetURL}/connect`, {
      method:'POST',
      headers:{'Content-Type':'application/json','SD-Client':'sundown-browser/1.0'},
      body: JSON.stringify({
        from_node_id:      S.node.node_id,
        from_public_key:   S.node.public_key,
        from_display_name: S.node.display_name,
        from_avatar_url:   '',
        from_node_url:     S.nodeURL,
        intro
      })
    });
    toast('Request sent');
    document.getElementById('target-url').value = '';
    document.getElementById('intro-msg').value = '';
  } catch(e) { toast('Failed: ' + e.message); }
}

// ── Node info ─────────────────────────────────────────────────────────────
function renderInfo() {
  const wk = S.node;
  document.getElementById('content').innerHTML = `
    <div class="section-title">Node info</div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-label">Display name</div><div class="info-value">${wk.display_name}</div></div>
      <div class="info-cell"><div class="info-label">Protocol</div><div class="info-value accent">Sundown Ontario ${wk.sd_version}</div></div>
      <div class="info-cell" style="grid-column:1/-1"><div class="info-label">Node ID</div><div class="info-value">${wk.node_id}</div></div>
      <div class="info-cell" style="grid-column:1/-1"><div class="info-label">Public key (X25519)</div><div class="info-value">${wk.public_key}</div></div>
      <div class="info-cell"><div class="info-label">Poll interval</div><div class="info-value">${wk.poll_interval_seconds}s / ${wk.poll_interval_max}s max</div></div>
      <div class="info-cell"><div class="info-label">Node URL</div><div class="info-value">${S.nodeURL}</div></div>
    </div>`;
}

// ── Tab routing ───────────────────────────────────────────────────────────
let activeTab = 'feed';
function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + tab);
  if (navEl) navEl.classList.add('active');
  switch(tab) {
    case 'feed':        refreshFeed(); break;
    case 'compose':
      document.getElementById('content').innerHTML = '<div class="section-title">New post</div>' + composerHTML();
      wireComposer(); break;
    case 'requests':    renderRequests(); refreshPending(); break;
    case 'connections': renderConnections(); break;
    case 'connect':     renderConnect(); break;
    case 'info':        renderInfo(); break;
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function hashColor(str) {
  let h = 0;
  for (const c of (str||'')) h = (h*31 + c.charCodeAt(0)) & 0xffffffff;
  return `hsl(${Math.abs(h)%360},35%,28%)`;
}
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('passphrase').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
